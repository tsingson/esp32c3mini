[platformio]
; Default build environments (select via PlatformIO toolbar)
default_envs =  beetle_esp32c6, esp32-c3, beetle_esp32c3, esp32dev

; Global configurations shared across all environments
[env]
framework = espidf
monitor_speed = 115200
monitor_filters = direct
# Forces the library dependency finder to scan deep for header references
lib_ldf_mode = deep

# Compilation and optimization flags
build_flags =
    -D LOG_LOCAL_LEVEL=ESP_LOG_INFO

[env:beetle_esp32c6]
platform = espressif32 @ 6.9.0
framework = espidf
board = esp32-c6-devkitc-1
monitor_speed = 115200

# 覆盖板级 JSON 配置，强制声明物理 Flash 大小
board_build.flash_size = 4MB
board_upload.flash_size = 4MB


[env:esp32-c3]
platform = espressif32@6.9.0
board = esp32-c3-devkitm-1
;board = esp32-c6-devkitc-1
;board = dfrobot_beetle_esp32c3
framework = espidf
monitor_speed = 115200
board_build.flash_mode = dio

[env:beetle_esp32c3]
platform = espressif32@6.9.0
board = dfrobot_beetle_esp32c3
# C3 同样强制指定物理 Flash 大小，防止因为默认板型差异导致断言崩溃
board_build.flash_size = 4MB
board_upload.flash_size = 4MB

; --- ESP32 Classic Environment ---
[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
# Standard esp32dev modules have 4MB flash. If yours is custom 2MB, keep this.
board_upload.flash_size = 4MB
