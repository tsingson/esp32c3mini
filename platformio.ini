[platformio]
; Default build environments (select via PlatformIO toolbar)
default_envs =  beetle_esp32c6

; Global configurations shared across all environments
[env]
framework = espidf
monitor_speed = 115200

# Forces the library dependency finder to scan deep for header references
lib_ldf_mode = deep

# Compilation and optimization flags
build_flags =
    -D LOG_LOCAL_LEVEL=ESP_LOG_INFO

[env:beetle_esp32c6]
platform = espressif32 @ 6.9.0
framework = espidf
board = esp32-c6-devkitc-1
monitor_speed = 115200

# 覆盖板级 JSON 配置，强制声明物理 Flash 大小
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
monitor_filters = direct
